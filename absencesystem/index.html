<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Attendance System</title>

<!-- CSS -->
<link rel="stylesheet" href="style.css">

<!-- jQuery & ChartJS -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<nav class="navbar">
  <a href="#">Home</a>
  <a href="#">Attendance List</a>
  <a href="#">Add Student</a>
  <a href="#">Reports</a>
  <a href="#">Logout</a>
</nav>

<div class="container">

  <!-- TABLE LEFT SIDE -->
  <div class="attendance">

    <div class="table-controls">
      <input type="text" id="searchName" placeholder="Search by Name">
      <button id="sortAbsences">Sort Abs (Asc)</button>
      <button id="sortParticipation">Sort Part (Desc)</button>
    </div>

    <div class="table-buttons">
      <button id="highlightExcellent">Highlight Excellent</button>
      <button id="resetColors">Reset</button>
    </div>

    <table id="attendanceTable">
      <thead>
        <tr>
          <th>ID</th><th>Last Name</th><th>First Name</th><th>Email</th>
          <th colspan="6">Sessions</th>
          <th colspan="6">Participation</th>
          <th>Absences</th><th>Participation</th><th>Message</th>
        </tr>
      </thead>

      <tbody>
        <tr>
          <td>31780801</td>
          <td>Ahmed</td>
          <td>Sara</td>
          <td>example@mail.com</td>
          <!-- 6 sessions -->
          <td><input type="checkbox"></td><td><input type="checkbox"></td>
          <td><input type="checkbox"></td><td><input type="checkbox"></td>
          <td><input type="checkbox"></td><td><input type="checkbox"></td>

          <!-- 6 participation -->
          <td><input type="checkbox"></td><td><input type="checkbox"></td>
          <td><input type="checkbox"></td><td><input type="checkbox"></td>
          <td><input type="checkbox"></td><td><input type="checkbox"></td>

          <td></td><td></td><td></td>
        </tr>

        <tr>
          <td>31780802</td>
          <td>Ali</td>
          <td>Yacine</td>
          <td>example@mail.com</td>

          <!-- 6 sessions -->
          <td><input type="checkbox"></td><td><input type="checkbox"></td>
          <td><input type="checkbox"></td><td><input type="checkbox"></td>
          <td><input type="checkbox"></td><td><input type="checkbox"></td>

          <!-- 6 participation -->
          <td><input type="checkbox"></td><td><input type="checkbox"></td>
          <td><input type="checkbox"></td><td><input type="checkbox"></td>
          <td><input type="checkbox"></td><td><input type="checkbox"></td>

          <td></td><td></td><td></td>
        </tr>
      </tbody>
    </table>

  </div>

  <!-- RIGHT SIDE PANELS -->
  <div class="side-panels">

    <!-- ADD STUDENT -->
    <div class="form-section">
      <h2>Add Student</h2>
      <form id="studentForm">

        <label for="studentId">Student ID</label>
        <input type="text" id="studentId" name="studentId">

        <label for="lastname">Last Name</label>
        <input type="text" id="lastname" name="lastname">

        <label for="firstname">First Name</label>
        <input type="text" id="firstname" name="firstname">

        <label for="email">Email</label>
        <input type="text" id="email" name="email">

        <button type="submit" class="submit-btn">Submit</button>
      </form>
    </div>

    <!-- REPORT -->
    <div class="report">
      <h2>Attendance Report</h2>
      <button id="showReportBtn">Show Report</button>
      <canvas id="reportChart"></canvas>
    </div>

  </div>
</div>

<!-- JS -->
<script src="script.js"></script>

</body>
</html>
